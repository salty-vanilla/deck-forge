name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm check

  package-ci:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: "@deck-forge/core"
            test-path: packages/core/src
          - package: "@deck-forge/tools"
            test-path: ""
          - package: "@deck-forge/cli"
            test-path: packages/cli/src
          - package: "@deck-forge/mcp-server"
            test-path: ""
          - package: "@deck-forge/runner"
            test-path: ""
          - package: "@deck-forge/adapters"
            test-path: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter "${{ matrix.package }}" build

      - name: Test package
        if: matrix.test-path != ''
        run: pnpm exec vitest run "${{ matrix.test-path }}"
